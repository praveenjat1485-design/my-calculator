<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>मेरी पहली वेबसाइट</title>
    <style>
        /* यह CSS है - जो वेबसाइट को सुंदर बनाता है */
        body {
            background-color: #f4f4f9;
            font-family: 'Arial', sans-serif;
            text-align: center;
            color: #333;
            padding: 50px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
        }
        h1 { color: #ff5722; }
        p { font-size: 18px; }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>

    <div class="card">
        <h1>राम राम सा! 🙏</h1>
        <p>मेरा नाम <b>प्रवीण</b> है।</p>
        <p>मुझे <b>दाल बाटी चूरमा</b> बहुत पसंद है और मैं कोडिंग सीख रहा हूँ।</p>
        
        <button onclick="swagat()">यहाँ क्लिक करें</button>
    </div>

    <script>
        /* यह JavaScript है - जो वेबसाइट में जान डालता है */
        function swagat() {
            alert("पधारो सा! आपकी वेबसाइट अब काम कर रही है।");
        }
    </script>

</body>
</html>
